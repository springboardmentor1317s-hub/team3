<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f7;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      height: 100vh;
      background: #1e3a8a;
      padding: 30px 20px;
      color: white;
      position: fixed;
      top: 0;
      left: 0;
    }

    .sidebar h2 {
      font-size: 26px;
      margin-bottom: 40px;
    }

    .sidebar button {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      color: white;
      background: none;
      border: none;
      text-align: left;
      font-size: 17px;
      cursor: pointer;
      transition: 0.3s;
    }

    .sidebar button:hover {
      background: #1d4ed8;
      border-radius: 6px;
    }

    /* Main Area */
    .main {
      margin-left: 260px;
      padding: 40px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 35px;
    }

    .topbar h1 {
      font-size: 34px;
      font-weight: bold;
    }

    .logout-btn {
      background: #dc2626;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    /* Cards */
    .cards {
      margin-top: 20px;
      display: flex;
      gap: 25px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 30px;
      width: 300px;
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card h3 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 40px;
      font-weight: bold;
      margin-top: 10px;
      color: #1e3a8a;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Admin Panel</h2>

    <button>Dashboard</button>
    <button>Create Event</button>
    <button>Participants</button>
    <button>Feedback</button>
  </div>

  <!-- Main Area -->
  <div class="main">

    <div class="topbar">
      <h1>Welcome Admin 👋</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h3>Total Events</h3>
        <p id="events">12</p>
      </div>

      <div class="card">
        <h3>Total Students</h3>
        <p id="students">128</p>
      </div>

      <div class="card">
        <h3>Pending Requests</h3>
        <p id="requests">5</p>
      </div>
    </div>

  </div>

  <script>
    function logout() {
      alert("Logged out!");
    }
  </script>

</body>

</html>
